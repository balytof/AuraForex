<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraForex - Plataforma de Trading</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060810; --surface: rgba(13, 17, 23, 0.7); --surface2: rgba(19, 25, 34, 0.8); --border: rgba(30, 45, 61, 0.5);
      --text: #fafafa; --muted: #94a3b8; --accent: #00d4ff; --accent-hover: #00b8e6;
      --danger: #ff4444; 
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      position: relative;
    }

    /* Background Animation */
    .bg-main {
      position: fixed; inset: 0;
      background: url('/aura_bot.png') no-repeat center center;
      background-size: cover;
      filter: brightness(0.4) saturate(1.2);
      z-index: -2;
      animation: breatheBot 12s ease-in-out infinite;
    }

    @keyframes breatheBot {
      0%, 100% { transform: scale(1.0); filter: brightness(0.4) saturate(1.2); }
      50% { transform: scale(1.05); filter: brightness(0.5) saturate(1.4); }
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(circle at 50% 50%, transparent 20%, var(--bg) 90%);
      z-index: -1;
    }

    /* Candle Animations */
    .candles { position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.3; }
    .candle {
      position: absolute;
      width: 4px;
      bottom: -100px;
      border-radius: 2px;
      animation: rise linear infinite;
    }
    .candle::after {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 1px; height: 100%; height: 150%; 
    }
    @keyframes rise {
      0% { transform: translateY(0); opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.7; }
      100% { transform: translateY(-110vh); opacity: 0; }
    }

    .auth-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: relative;
      z-index: 10;
    }

    /* Animated Text / Banner */
    .moving-text {
      position: fixed;
      top: 15%;
      left: 10%;
      font-family: 'Space Mono', monospace;
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 8px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 5;
      text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff, 0 0 40px #00d4ff;
      animation: floatPath 15s ease-in-out infinite, colorShift 8s linear infinite;
      opacity: 0.8;
    }

    @keyframes colorShift {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    @keyframes floatPath {
      0% { transform: translate(0, 0); }
      25% { transform: translate(15vw, 10vh); }
      50% { transform: translate(30vw, 0vh); }
      75% { transform: translate(15vw, -10vh); }
      100% { transform: translate(0, 0); }
    }
    .logo-container { text-align: center; margin-bottom: 30px; }
    .logo-container h1 { font-size: 2rem; letter-spacing:-1px; }
    .logo-container .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 5px; }
    
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--muted); }
    .form-input {
      width: 100%; background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px; padding: 12px;
      font-size: 0.9rem; transition: border 0.3s;
    }
    .form-input:focus { outline: none; border-color: var(--accent); }
    
    .btn {
      width: 100%; background: var(--accent); color: white;
      border: none; border-radius: 6px; padding: 12px;
      font-weight: 600; font-family: 'Syne', sans-serif;
      cursor: pointer; transition: background 0.2s; margin-top: 10px;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .toggle-text {
      text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--muted);
    }
    .toggle-text a {
      color: var(--accent); text-decoration: none; cursor: pointer;
    }
    .toggle-text a:hover { text-decoration: underline; }
    
    .error-msg { background: rgba(239, 68, 68, 0.1); color: var(--danger); font-size: 0.8rem; padding: 10px; border-radius: 6px; margin-bottom: 20px; display: none; text-align:center; }
    .success-msg { background: rgba(34, 197, 94, 0.1); color: #22c55e; font-size: 0.8rem; padding: 10px; border-radius: 6px; margin-bottom: 20px; display: none; text-align:center; }
    .pass-wrapper { position: relative; }
    .pass-wrapper .form-input { padding-right: 44px; }
    .pass-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1.1rem; padding: 0; line-height: 1;
    }
    .pass-toggle:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="bg-main"></div>
  <div class="bg-overlay"></div>
  
  <!-- Botão Voltar -->
  <a href="/" style="position: fixed; top: 20px; right: 20px; z-index: 1000; text-decoration: none; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; color: white; font-size: 0.85rem; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'">
    <span style="font-size: 1.1rem;">←</span> <span data-i18n="back_home">Voltar ao Início</span>
  </a>

  <!-- Seletor de Idioma -->
  <div style="position: fixed; top: 20px; left: 20px; z-index: 1000;">
    <select class="lang-switcher" onchange="changeLanguage(this.value)" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; outline: none; cursor: pointer; backdrop-filter: blur(10px);">
        <option value="pt">PT</option>
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="es">ES</option>
    </select>
  </div>

  <div class="candles" id="candleLane"></div>
  <div class="moving-text">AURATRADE · INSTITUTIONAL BOTS · ECOSSISTEMA GLOBAL</div>

  <div class="auth-container">
    <div class="logo-container">
      <img src="https://i.postimg.cc/LXD18bpf/Whats-App-Image-2026-04-28-at-11-55-06-removebg-preview.png" alt="AuraTrade Logo" style="height: 80px; margin-bottom: 20px;">
      <h1>AuraTrade</h1>
      <div class="subtitle" data-i18n="subtitle_login">Faça login para aceder ao Ecossistema de Bots</div>
    </div>

    <div id="errorBox" class="error-msg"></div>
    <div id="successBox" class="success-msg"></div>

    <div id="loginForm">
      <div class="form-group">
        <label data-i18n="label_email">Email</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="exemplo@auratrade.com">
      </div>
      <div class="form-group">
        <label data-i18n="label_pass">Password</label>
        <div class="pass-wrapper">
          <input type="password" id="loginPass" class="form-input" placeholder="••••••••">
          <button type="button" class="pass-toggle" onclick="togglePass('loginPass', this)" tabindex="-1">👁️</button>
        </div>
      </div>
      <button class="btn" onclick="doLogin(this)" data-i18n="btn_login">Entrar na Plataforma</button>
      <div class="toggle-text"><span data-i18n="no_account">Não tem conta?</span> <a onclick="toggleMode()" data-i18n="btn_toggle_reg">Registar-se</a></div>
    </div>

    <div id="registerForm" style="display:none;">
      <div class="form-group">
        <label data-i18n="label_new_email">Novo Email</label>
        <input type="email" id="regEmail" class="form-input" placeholder="exemplo@auraforex.com">
      </div>
      <div class="form-group">
        <label data-i18n="label_pass_min">Password (Mín. 6 careteres)</label>
        <div class="pass-wrapper">
          <input type="password" id="regPass" class="form-input" placeholder="••••••••">
          <button type="button" class="pass-toggle" onclick="togglePass('regPass', this)" tabindex="-1">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label data-i18n="label_ref">Código de Indicação (Obrigatório)</label>
        <input type="text" id="regRef" class="form-input" placeholder="O seu código de indicação" required>
      </div>
      <button class="btn" onclick="doRegister(this)" style="background:#10b981;" data-i18n="btn_register">Criar Conta</button>
      <div class="toggle-text"><span data-i18n="has_account">Já tem conta?</span> <a onclick="toggleMode()" data-i18n="btn_toggle_login">Voltar ao Login</a></div>
    </div>
  </div>

  <script>
    const translations = {
      pt: {
        back_home: "Voltar ao Início",
        subtitle_login: "Faça login para aceder ao Ecossistema de Bots",
        subtitle_register: "Crie a sua conta de Trading",
        label_email: "Email",
        label_pass: "Password",
        label_new_email: "Novo Email",
        label_pass_min: "Password (Mín. 6 caracteres)",
        label_ref: "Código de Indicação (Obrigatório)",
        btn_login: "Entrar na Plataforma",
        btn_register: "Criar Conta",
        no_account: "Não tem conta?",
        has_account: "Já tem conta?",
        btn_toggle_reg: "Registar-se",
        btn_toggle_login: "Voltar ao Login",
        err_fields: "Preencha todos os campos.",
        err_reg: "O email é obrigatório e a password deve ter pelo menos 6 caracteres.",
        err_ref: "O código de indicação é obrigatório.",
        msg_loading: "A processar...",
        msg_succ_reg: "Conta criada de forma segura! Por favor faça Login."
      },
      en: {
        back_home: "Back Home",
        subtitle_login: "Login to access the Bot Ecosystem",
        subtitle_register: "Create your Trading account",
        label_email: "Email",
        label_pass: "Password",
        label_new_email: "New Email",
        label_pass_min: "Password (Min. 6 characters)",
        label_ref: "Referral Code (Required)",
        btn_login: "Enter Platform",
        btn_register: "Create Account",
        no_account: "Don't have an account?",
        has_account: "Already have an account?",
        btn_toggle_reg: "Register Now",
        btn_toggle_login: "Back to Login",
        err_fields: "Please fill all fields.",
        err_reg: "Email is required and password must be at least 6 characters.",
        err_ref: "Referral code is required.",
        msg_loading: "Processing...",
        msg_succ_reg: "Account created securely! Please Login."
      },
      es: {
        back_home: "Volver al Inicio",
        subtitle_login: "Inicie sesión para acceder al Ecosistema de Bots",
        subtitle_register: "Cree su cuenta de Trading",
        label_email: "Correo electrónico",
        label_pass: "Contraseña",
        label_new_email: "Nuevo Correo",
        label_pass_min: "Contraseña (Mín. 6 caracteres)",
        label_ref: "Código de Referencia (Obligatorio)",
        btn_login: "Entrar en la Plataforma",
        btn_register: "Crear Cuenta",
        no_account: "¿No tienes una cuenta?",
        has_account: "¿Ya tienes una cuenta?",
        btn_toggle_reg: "Registrarse",
        btn_toggle_login: "Volver al Login",
        err_fields: "Por favor complete todos los campos.",
        err_reg: "El correo es obligatorio y la contraseña debe tener al menos 6 caracteres.",
        err_ref: "El código de referencia es obligatorio.",
        msg_loading: "Procesando...",
        msg_succ_reg: "¡Cuenta creada con éxito! Por favor inicie sesión."
      },
      fr: {
        back_home: "Retour à l'accueil",
        subtitle_login: "Connectez-vous pour accéder à l'écosystème",
        subtitle_register: "Créez votre compte de Trading",
        label_email: "Email",
        label_pass: "Mot de passe",
        label_new_email: "Nouvel Email",
        label_pass_min: "Mot de passe (Min. 6 caractères)",
        label_ref: "Code de Parrainage (Obligatoire)",
        btn_login: "Accéder à la Plateforme",
        btn_register: "Créer un Compte",
        no_account: "Vous n'avez pas de compte?",
        has_account: "Vous avez déjà un compte?",
        btn_toggle_reg: "S'inscrire",
        btn_toggle_login: "Retour au Login",
        err_fields: "Veuillez remplir tous les champs.",
        err_reg: "L'email est requis et le mot de passe doit comporter au moins 6 caractères.",
        err_ref: "Le code de parrainage est obligatoire.",
        msg_loading: "Traitement...",
        msg_succ_reg: "Compte créé avec succès! Veuillez vous connecter."
      }
    };

    function changeLanguage(lang) {
      const elements = document.querySelectorAll('[data-i18n]');
      elements.forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          el.innerHTML = translations[lang][key];
        }
      });
      localStorage.setItem('aura_lang', lang);
    }

    function togglePass(inputId, btn) {
      const input = document.getElementById(inputId);
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.textContent = show ? '🙈' : '👁️';
    }

    let mode = 'login';
    
    // Check referral link
    const urlParams = new URLSearchParams(window.location.search);
    const refCode = urlParams.get('ref');
    if (refCode) {
      setTimeout(() => {
        document.getElementById('regRef').value = refCode;
        document.getElementById('regRef').readOnly = true;
        document.getElementById('regRef').style.opacity = '0.7';
        if (mode === 'login') toggleMode();
      }, 100);
    }
    
    // Check if already logged in
    async function checkAuth() {
      const token = localStorage.getItem("aura_token");
      if (token) {
        try {
          const res = await fetch("/api/auth/me", { headers: { "Authorization": "Bearer " + token }});
          if(res.ok) window.location.href = "/dashboard";
        } catch(e) {}
      }
    }
    checkAuth();

    function toggleMode() {
      const lang = localStorage.getItem('aura_lang') || 'pt';
      mode = mode === 'login' ? 'register' : 'login';
      document.getElementById('loginForm').style.display = mode === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = mode === 'register' ? 'block' : 'none';
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('successBox').style.display = 'none';
      
      const sub = document.querySelector('.subtitle');
      sub.setAttribute('data-i18n', mode === 'login' ? 'subtitle_login' : 'subtitle_register');
      sub.innerHTML = translations[lang][mode === 'login' ? 'subtitle_login' : 'subtitle_register'];
    }

    function showErr(msg) {
      const b = document.getElementById('errorBox');
      b.textContent = msg; b.style.display = 'block';
      document.getElementById('successBox').style.display = 'none';
    }
    function showSucc(msg) {
      const b = document.getElementById('successBox');
      b.textContent = msg; b.style.display = 'block';
      document.getElementById('errorBox').style.display = 'none';
    }

    async function doLogin(btn) {
      const lang = localStorage.getItem('aura_lang') || 'pt';
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPass').value;
      if(!email || !pass) return showErr(translations[lang].err_fields);
      
      const originalText = btn.innerHTML;
      btn.disabled = true; btn.innerHTML = translations[lang].msg_loading;
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({email, password: pass})
        });
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || "Login Error");
        
        localStorage.setItem("aura_token", data.token);
        window.location.href = "/dashboard";
      } catch(e) {
        showErr(e.message);
      } finally {
        btn.disabled = false; btn.innerHTML = originalText;
      }
    }

    async function doRegister(btn) {
      const lang = localStorage.getItem('aura_lang') || 'pt';
      const email = document.getElementById('regEmail').value;
      const pass = document.getElementById('regPass').value;
      const referralCode = document.getElementById('regRef').value;
      
      if(!email || pass.length < 6) return showErr(translations[lang].err_reg);
      if(!referralCode) return showErr(translations[lang].err_ref);
      
      const originalText = btn.innerHTML;
      btn.disabled = true; btn.innerHTML = translations[lang].msg_loading;
      try {
        const res = await fetch("/api/auth/register", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({email, password: pass, referralCode})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Registration Error");
        
        showSucc(translations[lang].msg_succ_reg);
        setTimeout(() => toggleMode(), 2000);
      } catch(e) {
        showErr(e.message);
      } finally {
        btn.disabled = false; btn.innerHTML = originalText;
      }
    }

    function initCandles() {
      const lane = document.getElementById('candleLane');
      const colors = ['#00e676', '#ff4444'];
      for(let i=0; i<25; i++) {
        const c = document.createElement('div');
        c.className = 'candle';
        const color = colors[Math.floor(Math.random()*colors.length)];
        const h = Math.random() * 40 + 20;
        c.style.height = h + 'px';
        c.style.backgroundColor = color;
        c.style.left = Math.random() * 100 + '%';
        c.style.animationDuration = Math.random() * 10 + 5 + 's';
        c.style.animationDelay = Math.random() * 5 + 's';
        c.style.boxShadow = `0 0 10px ${color}`;
        lane.appendChild(c);
      }
    }

    window.onload = () => {
      const savedLang = localStorage.getItem('aura_lang') || 'pt';
      const switcher = document.querySelector('.lang-switcher');
      if (switcher) switcher.value = savedLang;
      changeLanguage(savedLang);
      initCandles();
    };
  </script>
</body>
</html>
